spring.application.name=api-gateway
server.port=8080


#JWT
jwt.secret.key=cHJvamVjdCBzZWFyY2ggZW5naW5lIGJldGEgY3ViYSA3MTE=
jwt.time.expiration=3600000

#Auth service routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

#User service routes
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

#Verification service routes
spring.cloud.gateway.routes[2].id=verification-service
spring.cloud.gateway.routes[2].uri=lb://verification-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/verify/**

#Eureka client
eureka.client.service-url.default-zone=http://eureka:password@localhost:8761/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

